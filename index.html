<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom right, #8fd3f4, #4facfe);
    }

    .login-box {
      width: 320px;
      text-align: center;
      color: #0b2a5b;
    }

    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 25px;
      outline: none;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border: none;
      border-radius: 30px;
      background: #2b7cff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>

</head>

<body>

<div class="login-box">
  <h1>WELCOME</h1>
  <p>Login to your account</p>

  <input type="text" id="user" placeholder="Enter username">
  <input type="password" id="pass" placeholder="Enter password">

  <button onclick="login()">Login</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA881pfDnTS4liIEzf6-N60WX3annXXMKg",
    authDomain: "vehicle-tracking-fc726.firebaseapp.com",
    databaseURL: "https://vehicle-tracking-fc726-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "vehicle-tracking-fc726",
    storageBucket: "vehicle-tracking-fc726.appspot.com",
    messagingSenderId: "861027714152",
    appId: "1:861027714152:web:12107c89f3fc2fa76a67dd"
  };

  firebase.initializeApp(firebaseConfig);

  function login() {
    let u = document.getElementById("user").value.trim();
    let p = document.getElementById("pass").value.trim();

    firebase.database().ref("users/" + u).once("value")
    .then((snapshot) => {
      if(snapshot.exists()) {
        let dbPass = snapshot.val().password;

        if(dbPass == p) {
          alert("Login success ✅");
          localStorage.setItem("login", "true");
          window.location.href = "dashboard.html";
        } else {
          alert("Wrong password ❌");
        }
      } else {
        alert("User not found ❌");
      }
    })
    .catch((error) => {
      console.error(error);
      alert("Error connecting to Firebase ❌");
    });
  }
</script>

</body>
</html>
