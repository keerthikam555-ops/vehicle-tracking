<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- Mobile responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom right, #8fd3f4, #4facfe);
      display: flex;
      justify-content: center;
    }

    .main {
      width: 95%;
      max-width: 1200px;
      margin-top: 20px;
    }

    header {
      text-align: center;
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    #map {
      height: 300px;
      width: 100%;
      border-radius: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .card {
      background: rgba(255,255,255,0.3);
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      border-radius: 25px;
      border: none;
      background: rgba(255,255,255,0.5);
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- LOGIN CHECK -->
<script>
if(localStorage.getItem("login") != "true"){
  window.location.href = "index.html";
}
</script>

<div class="main">

<header>🚗 Vehicle Tracking Dashboard</header>

<div id="map"></div>

<div class="container">

  <div class="card">
    <b>📍 Location</b><br><br>
    <span id="lat">--</span><br>
    <span id="lng">--</span>
  </div>

  <div class="card">
    <b>🚗 Speed</b><br><br>
    <span id="speed">0</span>
  </div>

  <div class="card">
    <b>⚠ Alerts</b><br><br>
    <span id="alert">--</span>
  </div>

</div>

<button onclick="logout()">Logout</button>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([12.97, 77.59], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

var marker = L.marker([12.97, 77.59]).addTo(map);

// 🔥 FIREBASE LIVE FETCH
setInterval(() => {
  fetch("https://vehicle-tracking-fc726-default-rtdb.asia-southeast1.firebasedatabase.app/vehicle.json")
    .then(res => res.json())
    .then(data => {

      if(!data) return;

      let lat = data.lat;
      let lng = data.lng;
      let speed = data.speed;

      document.getElementById("lat").innerText = lat.toFixed(5);
      document.getElementById("lng").innerText = lng.toFixed(5);
      document.getElementById("speed").innerText = speed.toFixed(1) + " km/h";

      // ALERT LOGIC
      if (speed > 60) {
        document.getElementById("alert").innerText = "🚨 Overspeed!";
        document.getElementById("alert").style.color = "red";
      } else {
        document.getElementById("alert").innerText = "✅ Normal";
        document.getElementById("alert").style.color = "green";
      }

      marker.setLatLng([lat, lng]);
      map.setView([lat, lng]);

    })
    .catch(err => console.log(err));
}, 3000);


// LOGOUT
function logout(){
  localStorage.removeItem("login");
  window.location.href = "index.html";
}

</script>

</body>
</html>
