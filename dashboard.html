<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom right, #8fd3f4, #4facfe);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* MAIN CONTAINER (IMPORTANT FIX) */
.main {
  width: 95%;
  max-width: 1200px;
  margin: auto;
  margin-top: 20px;
}

/* HEADER */
header {
  text-align: center;
  color: #0b2a5b;
  font-weight: bold;
  margin-bottom: 10px;
}

/* MAP */
#map {
  height: 450px;
  width: 100%;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* CARD CONTAINER */
.container {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
  width: 250px;
  text-align: center;
  font-size: 16px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: rgba(255,255,255,0.4);
  font-size: 16px;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- LOGIN CHECK -->
<script>
if(localStorage.getItem("login")!="true"){
  window.location.href="index.html";
}
</script>

<div class="main">

<header>🚗 Vehicle Tracking Dashboard</header>

<div id="map"></div>

<div class="container">

  <div class="card">
    <b>📍 Location</b><br><br>
    <span id="lat">--</span><br>
    <span id="lng">--</span>
  </div>

  <div class="card">
    <b>🚗 Speed</b><br><br>
    <span id="speed">0</span>
  </div>

  <div class="card">
    <b>⚠ Alerts</b><br><br>
    <span id="alert">...</span>
  </div>

</div>

<button onclick="logout()">Logout</button>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
var map = L.map('map').setView([12.97, 77.59], 13);

L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

var marker = L.marker([12.97, 77.59]).addTo(map);

// LIVE DATA
setInterval(() => {

  let lat = 12.97 + (Math.random() * 0.01);
  let lng = 77.59 + (Math.random() * 0.01);
  let speed = Math.random() * 120;

  document.getElementById("lat").innerText = lat.toFixed(5);
  document.getElementById("lng").innerText = lng.toFixed(5);

  document.getElementById("speed").innerText = speed.toFixed(1) + " km/h";

  if(speed > 60){
    document.getElementById("alert").innerText = "🚨";
    document.getElementById("alert").style.color = "red";
  } else {
    document.getElementById("alert").innerText = "✅";
    document.getElementById("alert").style.color = "green";
  }

  marker.setLatLng([lat, lng]);
  map.setView([lat, lng]);

}, 3000);

// LOGOUT
function logout(){
  localStorage.removeItem("login");
  window.location.href="index.html";
}

</script>

</body>
</html>
